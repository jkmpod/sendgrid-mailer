# golangci-lint configuration for sendgrid-mailer.
# See AGENTS.md (QC) for ownership and tuning policy.
# https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  go: "1.23"
  tests: true

linters:
  disable-all: true
  enable:
    # Default-on linters that catch correctness bugs:
    - errcheck       # unchecked error returns
    - govet          # standard go vet
    - ineffassign    # ineffective assignments
    - staticcheck    # large bag of correctness and style checks (incl. SA*)
    - unused         # unused vars, funcs, types
    # Style linters:
    - gofmt          # canonical formatting
    - goimports      # import grouping and organisation
    - misspell       # English misspellings
    # Security:
    - gosec          # security-focused checks (hardcoded creds, weak crypto, etc.)

# NOTE: errcheck has no settings block on purpose. Earlier versions of this
# config excluded fmt.Fprint* and (net/http.ResponseWriter).Write as "noisy
# or harmless"; in this codebase those calls write to the response writer
# and DO carry meaningful errors (e.g. the SSE stream in HandleSend). The
# exclusion masked a real ignored-error bug in sseEvent (caught by review,
# not by the linter). If a specific call site genuinely cannot fail, use
# `_, _ = call(...)` at that site to make the ignore explicit.
linters-settings:
  gosec:
    # G104 (unchecked errors) overlaps with errcheck — let errcheck handle it.
    excludes:
      - G104
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/jkmpod/sendgrid-mailer
  misspell:
    locale: UK   # project uses British spellings ("personalised", "behaviour")

issues:
  # Don't hide repeats — surface every finding so QC can see the full picture.
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Test files relax some security checks that don't apply (test fixtures
    # often look like hardcoded credentials but aren't real).
    - path: _test\.go
      linters:
        - gosec
